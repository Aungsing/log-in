<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(120deg, #4facfe, #00f2fe);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #007bff;
    }

    .login-box p {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>

    <input type="text" placeholder="Username" required>
    <input type="password" placeholder="Password" required>

    <button onclick="login()">Login</button>

    <p>Forgot password?</p>
  </div>

  <script>
    function login() {
      let user = document.querySelectorAll("input")[0].value;
      let pass = document.querySelectorAll("input")[1].value;

      if (user === "" || pass === "") {
        alert("Please fill all fields");
      } else {
        alert("Login successful (demo only)");
      }
    }
  </script>

</body>
</html>
